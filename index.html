<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FreshMart - Online Grocery Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }

        header {
            background-color: #2e7d32;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
        }

        .cart {
            font-size: 18px;
        }

        .search-bar {
            padding: 20px;
            text-align: center;
            background-color: #ffffff;
        }

        .search-bar input {
            width: 60%;
            padding: 10px;
            font-size: 16px;
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .category {
            background-color: white;
            padding: 15px 25px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .category:hover {
            background-color: #e8f5e9;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px 40px;
        }

        .product {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product h3 {
            margin: 10px 0 5px;
        }

        .price {
            color: #2e7d32;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product button {
            padding: 8px 15px;
            border: none;
            background-color: #2e7d32;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .product button:hover {
            background-color: #1b5e20;
        }

        footer {
            background-color: #263238;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    <h1>🛒 FreshMart</h1>
    <div class="cart">Cart (0)</div>
</header>

<div class="search-bar">
    <input type="text" placeholder="Search for fruits, vegetables, dairy...">
</div>

<div class="categories">
    <div class="category">🍎 Fruits</div>
    <div class="category">🥦 Vegetables</div>
    <div class="category">🥛 Dairy</div>
    <div class="category">🍞 Bakery</div>
    <div class="category">🥩 Meat</div>
</div>

<section class="products">

    <div class="product">
        <img src="https://source.unsplash.com/300x200/?apple" alt="Apple">
        <h3>Fresh Apples</h3>
        <div class="price">$3.99 / kg</div>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://source.unsplash.com/300x200/?banana" alt="Banana">
        <h3>Organic Bananas</h3>
        <div class="price">$2.49 / kg</div>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://source.unsplash.com/300x200/?milk" alt="Milk">
        <h3>Fresh Milk</h3>
        <div class="price">$1.99 / litre</div>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://source.unsplash.com/300x200/?bread" alt="Bread">
        <h3>Whole Wheat Bread</h3>
        <div class="price">$2.29</div>
        <button>Add to Cart</button>
    </div>

</section>

<footer>
    © 2026 FreshMart Online Grocery Store | Fast Delivery | Fresh Products
</footer>

</body>
</html>
